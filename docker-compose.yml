name: nanopods-house

services:
  web:
    build:
      context: .
      dockerfile: infra/web/Dockerfile
    image: nanopods-house-web:latest
    container_name: nanopods-house-web
    env_file: .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./src/static_site:/app/static_site
    restart: unless-stopped
